name: Publish GHCR Images

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            uptime_kuma_tag:
                description: "Base Uptime Kuma tag for the combined image"
                required: false
                default: "2.2.1"
                type: string

env:
    REGISTRY: ghcr.io

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image_name: uptime-kuma-restly
                      image_repo: cansoysal/uptime-kuma-restly
                      dockerfile: ./Dockerfile
                      context: .
                      extra_build_args: ""
                    - image_name: uptime-kuma-restly-combined
                      image_repo: cansoysal/uptime-kuma-restly-combined
                      dockerfile: ./docker/combined.Dockerfile
                      context: .
                      extra_build_args: |
                          UPTIME_KUMA_TAG=${{ inputs.uptime_kuma_tag || '2.2.1' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ matrix.image_repo }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=ref,event=tag
                      type=sha
                  labels: |
                      org.opencontainers.image.title=${{ matrix.image_name }}
                      org.opencontainers.image.description=Uptime Kuma Restly image published from GitHub Actions
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.url=https://github.com/${{ github.repository }}
                      org.opencontainers.image.vendor=cansoysal

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: ${{ matrix.extra_build_args }}
